<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <h1>Weather App</h1>
      <div class="input-box">
        <input type="text" id="cityName" />
        <button id="btn">Search</button>
      </div>
      <img id="icon" width="100" />
      <p id="error"></p>
      <div class="results">
        <p id="city"></p>
        <p id="temperature"></p>
        <p id="condition"></p>
        <p id="description"></p>
        <p id="humid"></p>
        <p id="wind"></p>
      </div>
    </div>
    <script src="App.js"></script>
  </body>
</html>
